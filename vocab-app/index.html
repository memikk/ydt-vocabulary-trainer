<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YDT Sözlük</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --primary-color: #bb86fc;
            --secondary-color: #03dac6;
            --danger-color: #cf6679;
            --success-color: #03dac6;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- Layout & Header --- */
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            padding: 8px;
        }

        .header-spacer {
            width: 40px;
        }

        /* --- Dashboard (Levels) --- */
        .stats-container {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            flex: 1;
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .stat-value {
            display: block;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .stat-label {
            font-size: 0.9rem;
            color: #bbb;
        }

        .section-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .levels-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
            overflow-y: auto;
            flex: 1;
            padding-bottom: 20px;
        }

        .levels-grid::-webkit-scrollbar {
            display: none;
        }

        .levels-grid {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .level-card {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.1s;
            border: 2px solid transparent;
        }

        .level-card:active {
            transform: scale(0.98);
        }

        .level-card.completed {
            border-color: var(--success-color);
        }

        .level-title {
            font-weight: bold;
            margin-bottom: 8px;
            display: block;
        }

        .level-progress-bg {
            background-color: #333;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }

        .level-progress-fill {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 0.3s;
        }

        /* --- Study View --- */
        .progress-bar-container {
            height: 4px;
            background: #333;
            width: 100%;
            margin-bottom: 20px;
            border-radius: 2px;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary-color);
            width: 0%;
            transition: width 0.3s;
        }

        .audio-btn {
            background: none;
            border: none;
            color: var(--secondary-color);
            cursor: pointer;
            margin-top: 10px;
            padding: 10px;
            border-radius: 50%;
            transition: background-color 0.2s;
        }

        .audio-btn:active {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: transform 0.1s;
            position: relative;
            width: 100%;
            box-sizing: border-box;
        }

        .card:active {
            transform: scale(0.98);
        }

        .card-content {
            width: 100%;
        }

        .word-type {
            color: #888;
            font-style: italic;
            margin-bottom: 15px;
        }

        hr {
            border: 0;
            height: 1px;
            background: #333;
            margin: 20px 0;
        }

        #meaning-display {
            font-size: 1.4rem;
            line-height: 1.4;
        }

        .tap-hint {
            color: #555;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        /* --- Controls --- */
        .controls {
            display: flex;
            gap: 15px;
            height: 60px;
            margin-top: auto;
        }

        .action-btn {
            flex: 1;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: filter 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .secondary-btn {
            background-color: #333;
            width: 100%;
            padding: 15px;
            margin-top: 10px;
        }

        .secondary-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .known-btn {
            background-color: var(--success-color);
            color: #000;
        }

        .unknown-btn {
            background-color: var(--danger-color);
            color: #000;
        }

        .hidden {
            display: none !important;
        }

        @keyframes shake {
            0% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            50% {
                transform: translateX(5px);
            }

            75% {
                transform: translateX(-5px);
            }

            100% {
                transform: translateX(0);
            }
        }

        .shake-animation {
            animation: shake 0.4s ease-in-out;
            border: 1px solid var(--danger-color);
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- HEADER -->
        <header>
            <div class="header-content">
                <button id="home-btn" class="icon-btn hidden" aria-label="Home">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
                    </svg>
                </button>
                <h1>YDT Sözlük</h1>
                <div class="header-spacer"></div> <!-- For balance -->
            </div>
        </header>

        <!-- DASHBOARD VIEW (Levels) -->
        <main id="dashboard-view">
            <div class="stats-container">
                <div class="stat-card">
                    <span class="stat-value" id="total-learned">0</span>
                    <span class="stat-label">Öğrenilen</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="total-unknown">0</span>
                    <span class="stat-label">Bilinmeyen</span>
                </div>
            </div>

            <div class="section-title">Bölümler</div>
            <div id="levels-grid" class="levels-grid">
                <!-- Levels will be injected here by JS -->
            </div>

            <button id="master-review-btn" class="action-btn secondary-btn" disabled>
                Bilemediklerimi Çalış (<span id="unknown-count-btn">0</span>)
            </button>
        </main>

        <!-- STUDY VIEW (Flashcards) -->
        <main id="study-view" class="hidden">
            <div class="progress-bar-container">
                <div id="session-progress" class="progress-bar"></div>
            </div>

            <div id="flashcard" class="card">
                <div class="card-content">
                    <h2 id="word-display">Loading...</h2>
                    <button id="audio-btn" class="audio-btn" aria-label="Pronounce">
                        <svg viewBox="0 0 24 24" width="28" height="28">
                            <path fill="currentColor"
                                d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
                        </svg>
                    </button>
                    <p id="type-display" class="word-type"></p>
                    <div id="meaning-container" class="hidden">
                        <hr>
                        <p id="meaning-display"></p>
                    </div>
                </div>
                <p class="tap-hint">Cevabı görmek için dokun</p>
            </div>

            <div class="controls">
                <button id="btn-known" class="action-btn known-btn hidden">
                    <span class="icon">✓</span> Biliyorum
                </button>
                <button id="btn-unknown" class="action-btn unknown-btn hidden">
                    <span class="icon">✗</span> Bilmiyorum
                </button>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="data.js"></script>
    <script src="app.js"></script>
    <script>
        // Fallback for CSS loading or white screen check
        document.body.style.backgroundColor = getComputedStyle(document.body).getPropertyValue('--bg-color') || '#121212';
    </script>
</body>

</html>
